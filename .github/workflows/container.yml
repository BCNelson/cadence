name: Container Image

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/bcnelson/cadence

jobs:
  test:
    if: github.ref_type == 'branch'
    uses: ./.github/workflows/ci.yml

  build:
    if: github.ref_type == 'branch'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
      - name: Build metadata
        id: build-meta
        run: |
          echo "version=$(git describe --tags --always 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build-meta.outputs.version }}
            COMMIT=${{ steps.build-meta.outputs.commit }}
            BUILD_DATE=${{ steps.build-meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Wait for image to be available
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          for i in $(seq 1 30); do
            if docker buildx imagetools inspect "$IMAGE" > /dev/null 2>&1; then
              echo "Image $IMAGE found"
              exit 0
            fi
            echo "Image not found, waiting 30s... (attempt $i/30)"
            sleep 30
          done
          echo "Timed out waiting for $IMAGE"
          exit 1
      - name: Retag existing image with semver tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | while read -r TAG; do
            [ -z "$TAG" ] && continue
            docker buildx imagetools create \
              --tag "$TAG" \
              "${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          done

  release-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Stage embedded frontend
        run: |
          mkdir -p internal/web/dist
          cp -r frontend/dist/. internal/web/dist/
      - name: Build metadata
        id: build-meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Cross-compile binaries
        env:
          VERSION: ${{ steps.build-meta.outputs.version }}
          COMMIT: ${{ steps.build-meta.outputs.commit }}
          BUILD_DATE: ${{ steps.build-meta.outputs.build_date }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            outdir="cadence_${VERSION}_${GOOS}_${GOARCH}"
            mkdir -p "build/${outdir}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -ldflags="${LDFLAGS}" \
              -o "build/${outdir}/cadence" \
              ./cmd/cadence
            tar -C build -czf "dist/${outdir}.tar.gz" "${outdir}"
          done
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS )
          ls -la dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
