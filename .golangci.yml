version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
  exclusions:
    paths:
      - frontend/node_modules
      - internal/testutil

formatters:
  enable:
    - gofmt
    - goimports
